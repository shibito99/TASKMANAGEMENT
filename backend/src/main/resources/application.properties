# ===== サーバー設定 =====
server.port=8080

# ===== データベース接続設定 =====
# 接続先は docker-compose.yml で起動した PostgreSQL コンテナ（localhost:5432）
# 値は環境変数で上書き可能。未設定時はデフォルト値を使用
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmanagement}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate 設定 =====
# update: 起動時にエンティティをもとにテーブルを自動作成・更新する（開発用）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ビューレンダリング中のDB呼び出しを禁止（REST APIのため不要）
spring.jpa.open-in-view=false

# ===== ログ設定 =====
logging.level.com.taskmanagement=DEBUG
